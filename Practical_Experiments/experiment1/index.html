<!-- 
  HELLO STUDENT! 
  Think of this HTML file as the "Skeleton" of your house. 
  It defines where the rooms (divs) and the headings (h1) are. 
-->
<!DOCTYPE html>
<html>
<head>
  <!-- This section is like the 'Brain' of the page. It's invisible to users. -->
  <meta charset="UTF-8"/>
  <title> My First Webpage </title>
  <meta name="description" content="A simple example for beginners"/>
</head>
<body>
  <!-- The <body> is the 'Skin' — everything you see on screen goes here! -->

  <div id="intro">   
    <!-- <h1> is the biggest heading. Think of it as a Book Title. -->
    <h1> Introduction </h1>
    <p>This is the start of our story. We are learning how to build the web!</p>	
  </div>

  <div id="main">
    <!-- A <div> is like a cardboard box used to group things together. -->
    <h2> The Main Part </h2>
    <p>This is where the most important information lives.</p>
  </div>

  <div id="footer">
    <hr/> <!-- This is a 'Horizontal Rule' — a simple line to separate things. -->
    <p>Built by Divya Prakash at IIT Madras</p>
  </div>

</body>
</html>
