# Conceptual Docker Compose for a MAD App
# This defines two services: a Flask app and a Database

version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/code
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgres://user:pass@db:5432/mad_db
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=mad_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
